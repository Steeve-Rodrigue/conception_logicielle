services:
  db:
    image: postgres:14-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DATABASE}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  init-db:
    build: ./backend
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      PYTHONPATH: /code
    working_dir: /code
    command: python src/dao/reset_database.py
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  backend:
    build: ./backend
    env_file:
      - .env
    environment:
      API_HOST: 0.0.0.0
      POSTGRES_HOST: db
    ports:
      - "${API_PORT}:${API_PORT}"
    depends_on:
      db:
        condition: service_healthy
      # init-db:
      #   condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL}
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
